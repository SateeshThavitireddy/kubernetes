apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
labels:
  purpose: dp-demo
  project: roboshop
spec:
  replicas: 4
  selector:
    matchLabels:
      purpose: headless-svc-demo
      project: roboshop
  template:
    metadata:
      labels:
        purpose: headless-svc-demo
        project: roboshop
    spec:
      containers:
        - name: nginx
          image: nginx:latest
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  type: LoadBalancer
  selector:
    purpose: headless-svc-demo
    project: roboshop
  ports:
    - protocol: TCP
      port: 80 # service port
      targetPort: 80 # container port
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-headles
spec:
  # if a service clusterIP then it is called as headless service
  clusterIP: None
  selector:
    purpose: headless-svc-demo
    project: roboshop
  ports:
    - protocol: TCP
      port: 80 # service port
      targetPort: 80 # container port
