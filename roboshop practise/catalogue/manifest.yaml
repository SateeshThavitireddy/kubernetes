apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue-config
  namespace: roboshop
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    name: catalogue
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      name: catalogue
      tier: backend
  template:
    metadata:
      labels:
        project: roboshop
        name: catalogue
        tier: backend
  spec:
    containers:
      - name: catalogue
        image: joindevops/catalogue:v1
        imagePullPolicy: Always
        envFrom:
          configMapRef:
            name: catalogue-config
          ports:
            - name: liveness-port
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: liveness-port
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: liveness-port
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    name: catalogue
    tier: backend
spec:
  selector:
    project: roboshop
    name: catalogue
    tier: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
