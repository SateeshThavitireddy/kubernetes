apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    component: rabbitmq
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
    project: roboshop
    component: rabbitmq
    tier: database
  template:
    metadata:
      labels:
        project: roboshop
        component: rabbitmq
        tier: database
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3
          imagePullPolicy: Always
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "roboshop"
            - name: RABBITMQ_DEFAULT_PASS
              value: "roboshop123"
        readinessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 2
        livenessProbe:
          tcpSocket:
            port: 5672
          intialDelaySeconds: 20
          perdiodSecomnds: 20
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
spec:
  selector:
    labels:
      project: roboshop
      component: rabbitmq
      tier: database
    ports:
      - protocol: TCP
        port: 5672
        targetPort: 5672