apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    component: redis
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: redis
      tier: database
  template:
    metadata:
      labels:
        project: roboshop
        component: redis
        tier: database
    spec:
      containers:
        - name: redis
          image: redis:7.0
          imagePullPolicy: Always
      readinessProbe:
        tcpSocket:
          port: 6397
        intialDelaySeconds: 10
        periodSeconds: 5
      livenessProbe:
        tcpSocket:
          port: 6397
        intialDelaySeconds: 20
        periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
spec:
  selector:
    labels:
      project: roboshop
      component: redis
      tier: database
  ports:
    - protocol: TCP
      port: 6397
      targetPort: 6397
