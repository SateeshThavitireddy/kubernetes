apiVersion: v1
kind: cart-ConfigMap
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    name: cart
    tier: backend
data:
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    name: cart
    tier: backend
spec:
 replicas: 1
 selector:
    matchLabels:
      project: roboshop
      name: cart
      tier: backend
  template:
    metadata:
      labels:
        project: roboshop
        name: cart
        tier: backend
  spec:
    containers:   
      - name: cart
        image: joindevops/cart:v1
        imagePullPolicy: Always
        envFrom:
         - configMapRef:
            name: cart
          ports:
            - name: liveness-port
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: liveness-port
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:  
              path: /health
              port: liveness-port
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: 
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    name: cart
    tier: backend
spec:
  selector:
    project: roboshop
    name: cart
    tier: backend
  ports:
    - protocol: TCP 
      port: 8080
      targetPort: 8080
      