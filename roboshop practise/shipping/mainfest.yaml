apiVersion: v1
kind: shipping-ConfigMap
metadata:
  name: shipping  
  namespace: roboshop
data:
  ART_ENDPOINT: "cart:8080"
  DB_HOST: "mysql"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    name: shipping
    tier: backend
spec:
 replicas: 1
 selector:
    matchLabels:
      project: roboshop
      name: shipping
      tier: backend
  template:
    metadata:
      labels:
        project: roboshop
        name: shipping
        tier: backend
  spec:
    containers:   
      - name: shipping
        image: joindevops/shipping:v1
        imagePullPolicy: Always
        envFrom:
         - configMapRef:
            name: shipping
          ports:
            - name: liveness-port
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: liveness-port
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:  
              path: /health
              port: liveness-port
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: 
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    name: shipping
    tier: backend
spec:
  selector:
    project: roboshop
    name: shipping
    tier: backend
  ports:
    - protocol: TCP 
      port: 8080
      targetPort: 8080
      