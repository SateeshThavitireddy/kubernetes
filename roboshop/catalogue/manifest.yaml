apiVersion: app/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    component: catalogue
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: catalogue
      tier: backend
    template:
      metadata:
        labels:
          project: roboshop
          component: catalogue
          tier: backend
    spec:
      containers:
        - name: catalogue
          image: joindevops/catalogue:v1
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: catalogue-config-map
          ports:
            - name: liveness-port
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readiness
              port: liveness-port
            failureThreshold: 1
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /liveness
              port: liveness-port
            failureThreshold: 2
            periodSeconds: 15
