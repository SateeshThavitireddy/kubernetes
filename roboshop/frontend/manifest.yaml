apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    component: frontend
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: frontend
      tier: frontend
  template:
    metadata:
      labels:
        project: roboshop
        component: frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: roboshop/frontend:1.0
          ports:
            - name: liveness-port
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: frontend-configmap
          readinessProbe:
            httpGet:
              path: /readiness
              port: liveness-port
            initialDelaySeconds: 10
            failureThreshold: 3
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /liveness
              port: liveness-port
            initialDelaySeconds: 10
            failureThreshold: 3
            periodSeconds: 15
